services:
  db:
    image: postgres:16-alpine
    container_name: zorvyn-postgres
    environment:
      POSTGRES_DB: zorvyn-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d zorvyn-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zorvyn-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/zorvyn-db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
